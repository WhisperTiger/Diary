<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>我的日记</title>
<style>
:root {
  --bg: #F7F4F0;
  --card: #FFFFFF;
  --text: #2C2C2C;
  --text-secondary: #7A7A7A;
  --text-muted: #AAAAAA;
  --border: #E8E3DC;
  --accent: #5B8C6F;
  --accent-light: #E8F0EB;
  --accent-hover: #4A7A5E;
  --warm: #D4915A;
  --warm-light: #FDF0E5;
  --danger: #C25450;
  --danger-light: #FDEDEC;
  --blue: #5B8EA8;
  --blue-light: #EDF4F7;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --transition: 0.2s ease;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }

.app {
  max-width: 1100px; margin: 0 auto; padding: 16px;
  display: grid; grid-template-columns: 320px 1fr;
  grid-template-rows: auto auto auto 1fr; gap: 16px; min-height: 100vh;
}
.header {
  grid-column: 1 / -1;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
.header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ===== Upcoming Bar ===== */
.upcoming-bar {
  grid-column: 1 / -1;
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 12px 16px;
  border: 1px solid var(--border); display: none;
}
.upcoming-bar.visible { display: block; }
.upcoming-title {
  font-size: 0.75rem; font-weight: 600; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
}
.upcoming-list { display: flex; flex-wrap: wrap; gap: 8px; }
.upcoming-item {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 12px; background: var(--blue-light);
  border-radius: 16px; font-size: 0.8rem; cursor: pointer;
  transition: var(--transition); border: 1px solid transparent;
}
.upcoming-item:hover { border-color: var(--blue); }
.up-check {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid var(--accent); color: var(--accent);
  font-size: 12px; cursor: pointer; flex-shrink: 0;
  transition: var(--transition); line-height: 1;
}
.up-check:hover { background: var(--accent); color: #fff; }
.up-day { font-weight: 600; color: var(--blue); white-space: nowrap; cursor: pointer; }
.up-text { color: var(--text); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }

.sidebar { display: flex; flex-direction: column; gap: 16px; }
.main { display: flex; flex-direction: column; gap: 16px; }

.card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 20px; border: 1px solid var(--border);
}

.calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.calendar-month { font-weight: 600; font-size: 1rem; }
.cal-nav-btn {
  background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 4px 10px; cursor: pointer; font-size: 1rem;
  color: var(--text); transition: var(--transition);
}
.cal-nav-btn:hover { background: var(--accent-light); }
.cal-weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr);
  text-align: center; font-size: 0.75rem; color: var(--text-secondary);
  margin-bottom: 6px; font-weight: 500;
}
.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-day {
  aspect-ratio: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 0.85rem; position: relative;
  transition: var(--transition); border: 1px solid transparent;
}
.cal-day:hover { background: var(--accent-light); }
.cal-day.today { font-weight: 700; color: var(--accent); border-color: var(--accent); }
.cal-day.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
.cal-day.selected.today { color: #fff; }
.cal-day.other-month { color: var(--text-muted); cursor: default; }
.cal-day.other-month:hover { background: transparent; }
.cal-day .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--warm); margin-top: 2px; }
.cal-day.selected .dot { background: #fff; }

.date-nav { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.date-nav .date-label { font-size: 1.15rem; font-weight: 600; min-width: 130px; }
.distance-badge { font-size: 0.8rem; padding: 2px 10px; border-radius: 12px; font-weight: 500; }
.distance-badge.past { background: var(--warm-light); color: var(--warm); }
.distance-badge.today { background: var(--accent-light); color: var(--accent); }
.distance-badge.future { background: var(--blue-light); color: var(--blue); }

.btn {
  padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--card); cursor: pointer; font-size: 0.875rem;
  color: var(--text); transition: var(--transition);
  font-family: var(--font); white-space: nowrap;
}
.btn:hover { background: var(--accent-light); border-color: var(--accent); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-hover); }
.btn-danger { color: var(--danger); }
.btn-danger:hover { background: var(--danger-light); border-color: var(--danger); }
.btn-sm { padding: 4px 10px; font-size: 0.8rem; }
.btn-icon { padding: 6px 8px; font-size: 1rem; line-height: 1; }
.btn-xs { padding: 2px 8px; font-size: 0.75rem; }
.btn-active { background: var(--accent); color: #fff; border-color: var(--accent); }

.form-section { margin-bottom: 18px; }
.form-label {
  display: block; font-size: 0.8rem; font-weight: 600;
  color: var(--text-secondary); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px;
  cursor: pointer; font-size: 0.85rem; transition: var(--transition);
  user-select: none; background: var(--card);
}
.chip:hover { border-color: var(--accent); }
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
input[type="text"], textarea {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 0.9rem;
  font-family: var(--font); color: var(--text); background: var(--bg);
  transition: var(--transition); resize: vertical;
}
input[type="text"]:focus, textarea:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light); background: var(--card);
}
textarea { min-height: 70px; }

.todo-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
.todo-input-row input { flex: 1; }
.todo-list { display: flex; flex-direction: column; gap: 4px; }
.todo-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: var(--radius-sm); transition: var(--transition);
}
.todo-item:hover { background: var(--bg); }
.todo-checkbox {
  width: 18px; height: 18px; border: 2px solid var(--border);
  border-radius: 4px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  transition: var(--transition); font-size: 12px; color: transparent;
}
.todo-checkbox.done { background: var(--accent); border-color: var(--accent); color: #fff; }
.todo-text { flex: 1; font-size: 0.9rem; }
.todo-text.done { text-decoration: line-through; color: var(--text-muted); }
.todo-delete {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 1rem;
  padding: 2px 6px; border-radius: 4px;
  transition: var(--transition); line-height: 1;
}
.todo-delete:hover { color: var(--danger); background: var(--danger-light); }

.view-switcher {
  display: flex; gap: 0; border: 1px solid var(--border);
  border-radius: var(--radius-sm); overflow: hidden;
}
.view-switcher .btn { border: none; border-radius: 0; padding: 7px 18px; font-size: 0.85rem; }
.view-switcher .btn:first-child { border-right: 1px solid var(--border); }
.view-switcher .btn-active { background: var(--accent); color: #fff; }

.table-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.table-toolbar .label { font-size: 0.8rem; color: var(--text-secondary); }
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.table-wrap table { width: 100%; border-collapse: collapse; font-size: 0.8rem; white-space: nowrap; }
.table-wrap th {
  text-align: left; padding: 8px 10px; font-size: 0.7rem; font-weight: 600;
  color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 2px solid var(--border); background: var(--card);
  position: sticky; top: 0; z-index: 1;
}
.table-wrap td {
  padding: 8px 10px; border-bottom: 1px solid var(--border);
  max-width: 140px; overflow: hidden; text-overflow: ellipsis;
}
.table-wrap tr.clickable-row:hover td { background: var(--accent-light); cursor: pointer; }
.table-wrap .date-link { color: var(--accent); font-weight: 600; }
.table-wrap .td-empty { color: var(--text-muted); }
.td-todo-count { font-size: 0.8rem; }
.td-todo-count .done-count { color: var(--accent); }
.td-todo-count .pending-count { color: var(--warm); }

.history-list { display: flex; flex-direction: column; gap: 2px; max-height: 400px; overflow-y: auto; }
.history-month {
  font-size: 0.75rem; font-weight: 600; color: var(--text-secondary);
  padding: 8px 4px 4px; text-transform: uppercase; letter-spacing: 0.5px;
  position: sticky; top: 0; background: var(--card); z-index: 1;
}
.history-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; border-radius: var(--radius-sm);
  cursor: pointer; transition: var(--transition); gap: 8px;
}
.history-item:hover { background: var(--accent-light); }
.history-item.active { background: var(--accent-light); font-weight: 600; }
.history-item .hi-date { font-size: 0.85rem; white-space: nowrap; }
.history-item .hi-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--warm); flex-shrink: 0; }
.history-item .hi-summary {
  font-size: 0.8rem; color: var(--text-secondary);
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.history-item .hi-future {
  font-size: 0.7rem; color: var(--blue); background: var(--blue-light);
  padding: 1px 6px; border-radius: 10px; flex-shrink: 0;
}
.history-empty { font-size: 0.85rem; color: var(--text-muted); text-align: center; padding: 20px; }

.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; padding: 8px 12px 8px 32px; border: 1px solid var(--border);
  border-radius: 20px; font-size: 0.85rem; font-family: var(--font); background: var(--bg);
}
.search-wrap input:focus { outline: none; border-color: var(--accent); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.85rem; pointer-events: none; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff; padding: 10px 24px;
  border-radius: 20px; font-size: 0.875rem;
  z-index: 1000; opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.toast.show { opacity: 1; }

.stat-row { display: flex; gap: 12px; flex-wrap: wrap; }
.stat-badge {
  background: var(--accent-light); color: var(--accent);
  padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 500;
}

@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; gap: 12px; padding: 10px; }
  .sidebar { order: 2; }
  .main { order: 1; }
  .form-row, .form-row-3 { grid-template-columns: 1fr; }
  .date-nav, .header { justify-content: center; text-align: center; }
  .card { padding: 14px; }
  .cal-day { font-size: 0.8rem; }
  .history-list { max-height: 250px; }
  .table-wrap td { padding: 6px 8px; font-size: 0.75rem; }
  .table-wrap th { padding: 6px 8px; font-size: 0.65rem; }
}

.history-list::-webkit-scrollbar, .table-wrap::-webkit-scrollbar { width: 4px; height: 4px; }
.history-list::-webkit-scrollbar-track, .table-wrap::-webkit-scrollbar-track { background: transparent; }
.history-list::-webkit-scrollbar-thumb, .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.footer { grid-column: 1 / -1; text-align: center; padding: 12px; font-size: 0.75rem; color: var(--text-muted); }

/* ===== Sync Panel ===== */
.sync-panel { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.sync-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  background: var(--text-muted); transition: var(--transition);
}
.sync-dot.synced { background: var(--accent); }
.sync-dot.syncing { background: var(--warm); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--danger); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.sync-label { font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap; }
.sync-setup-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.3);
  display: flex; align-items: center; justify-content: center; z-index: 2000;
}
.sync-setup-card {
  background: var(--card); border-radius: var(--radius); padding: 24px;
  max-width: 400px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.sync-setup-card h3 { margin-bottom: 4px; font-size: 1rem; }
.sync-setup-card .hint { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 16px; }
.sync-setup-card .form-section { margin-bottom: 14px; }
.sync-setup-card .actions { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>
<div class="app">
  <!-- Upcoming Bar -->
  <div class="upcoming-bar" id="upcomingBar">
    <div class="upcoming-title">📋 近期待办任务</div>
    <div id="upcomingContent"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo">📔 我的日记</span>
      <div class="stat-row" id="stats"></div>
    </div>
    <div class="header-actions">
      <button class="btn btn-sm" onclick="exportData()" title="导出为 JSON 文件">📤 导出</button>
      <button class="btn btn-sm" onclick="document.getElementById('importInput').click()" title="从 JSON 文件导入">📥 导入</button>
      <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
      <span class="sync-panel" id="syncPanel">
        <span class="sync-dot" id="syncDot" title="同步状态"></span>
        <span class="sync-label" id="syncLabel">未配置</span>
        <button class="btn btn-xs" onclick="showSyncSetup()" title="配置云端同步">☁️ 同步设置</button>
      </span>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="card">
      <div class="calendar-header">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">◀</button>
        <span class="calendar-month" id="calMonthLabel"></span>
        <button class="cal-nav-btn" onclick="changeMonth(1)">▶</button>
      </div>
      <div class="cal-weekdays"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
      <div class="cal-days" id="calDays"></div>
    </div>
    <div class="card">
      <div class="search-wrap" style="margin-bottom:10px">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索日记..." oninput="renderHistory()">
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- Table View Card -->
    <div class="card" id="tableViewCard" style="display:none">
      <div class="table-toolbar">
        <div class="view-switcher">
          <button class="btn" onclick="switchView('table')" id="viewBtnTable">📋 表格</button>
          <button class="btn" onclick="switchView('diary')" id="viewBtnDiary">📝 日记</button>
        </div>
        <button class="btn btn-xs" onclick="pageTable(-1)" title="更早">◀ 更早</button>
        <span class="label" id="tableRangeLabel" style="min-width:100px;text-align:center"></span>
        <button class="btn btn-xs" onclick="pageTable(1)" title="更晚">更晚 ▶</button>
        <span class="label">范围：</span>
        <button class="btn btn-xs" onclick="setTableRange(7)" id="rangeBtn7">7天</button>
        <button class="btn btn-xs btn-active" onclick="setTableRange(14)" id="rangeBtn14">14天</button>
        <button class="btn btn-xs" onclick="setTableRange(30)" id="rangeBtn30">30天</button>
        <button class="btn btn-xs" onclick="setTableRange(60)" id="rangeBtn60">60天</button>
        <button class="btn btn-xs" onclick="setTableRange(180)" id="rangeBtn180">180天</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>日期</th><th>节假日</th><th>活动</th><th>待办</th><th>运动</th><th>工作</th><th>城市</th><th>饮食</th><th>感想</th></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Diary Editor Card -->
    <div class="card" id="diaryCard">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px">
        <div class="date-nav">
          <button class="btn btn-sm" onclick="goToToday()">📅 今天</button>
          <button class="btn btn-icon btn-sm" onclick="changeDate(-1)">◀</button>
          <span class="date-label" id="dateLabel"></span>
          <span class="distance-badge" id="distanceBadge"></span>
          <button class="btn btn-icon btn-sm" onclick="changeDate(1)">▶</button>
        </div>
        <div class="view-switcher">
          <button class="btn" onclick="switchView('table')">📋 表格</button>
          <button class="btn btn-active" onclick="switchView('diary')">📝 日记</button>
        </div>
      </div>

      <div class="form-row">
        <div class="form-section"><label class="form-label">运动</label><div class="chip-group" id="exerciseEl"></div></div>
        <div class="form-section"><label class="form-label">工作状态</label><div class="chip-group" id="workStatusEl"></div></div>
      </div>

      <div class="form-row-3">
        <div class="form-section"><label class="form-label">所在城市</label><input type="text" id="cityInput" placeholder="如：北京"></div>
        <div class="form-section"><label class="form-label">天气</label><input type="text" id="weatherInput" placeholder="晴 / 多云 / 雨..."></div>
        <div class="form-section"><label class="form-label">是否节假日</label><div class="chip-group" id="holidayEl"></div></div>
      </div>

      <div class="form-row">
        <div class="form-section"><label class="form-label">身体状态</label><input type="text" id="bodyInput" placeholder="今天的身体感受..."></div>
        <div class="form-section"><label class="form-label">饮食</label><input type="text" id="dietInput" placeholder="早餐/午餐/晚餐..."></div>
      </div>

      <div class="form-section"><label class="form-label">家人情况</label><input type="text" id="familyInput" placeholder="家人今日要点..."></div>
      <div class="form-section"><label class="form-label">今日活动</label><textarea id="tasksInput" placeholder="今天做了什么..."></textarea></div>

      <div class="form-section">
        <label class="form-label">待办事项</label>
        <div class="todo-input-row">
          <input type="text" id="todoInput" placeholder="添加待办..." onkeydown="if(event.key==='Enter'){addTodo();event.preventDefault()}">
          <button class="btn btn-sm" onclick="addTodo()">+ 添加</button>
        </div>
        <div class="todo-list" id="todoList"></div>
      </div>

      <div class="form-section"><label class="form-label">感想</label><textarea id="thoughtsInput" placeholder="今日的感悟和思考..." style="min-height:120px"></textarea></div>

      <div class="form-section">
        <label class="form-label">标签</label>
        <div class="chip-group" id="tagsEl"></div>
        <input type="text" id="customTagInput" placeholder="+ 自定义标签" style="margin-top:8px;width:160px" onkeydown="if(event.key==='Enter'){addCustomTag();event.preventDefault()}">
      </div>

      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="saveDiary()">💾 保存</button>
        <button class="btn btn-danger btn-sm" onclick="deleteDiary()">🗑 删除这篇</button>
        <span style="font-size:0.75rem;color:var(--text-muted);margin-left:auto" id="saveHint"></span>
      </div>
    </div>
  </main>

  <div class="footer">数据存储在浏览器本地 · <a href="#" onclick="exportData();return false" style="color:var(--accent)">导出备份</a> 以防丢失</div>
</div>

<!-- Sync Setup Overlay -->
<div class="sync-setup-overlay" id="syncSetupOverlay" style="display:none">
  <div class="sync-setup-card">
    <h3>☁️ 云端同步设置</h3>
    <p class="hint">使用 GitHub Gist 同步数据到所有设备。<br>需要 <a href="https://github.com/settings/tokens/new?scopes=gist&description=diary-sync" target="_blank" style="color:var(--accent)">创建 Gist Token</a>（仅勾选 gist 权限）。</p>
    <div class="form-section"><label class="form-label">GitHub Token</label><input type="password" id="syncTokenInput" placeholder="ghp_..."></div>
    <div class="form-section"><label class="form-label">Gist ID</label><input type="text" id="syncGistIdInput" placeholder="留空自动创建"></div>
    <div class="actions">
      <button class="btn btn-sm" onclick="hideSyncSetup()">取消</button>
      <button class="btn btn-sm btn-primary" onclick="saveSyncConfig()">保存并连接</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'diary_data';
const EXERCISE_OPTIONS = ['跑步', '力量', '散步', '游泳', '骑行', '羽毛球', '其他', '无'];
const WORK_STATUS_OPTIONS = ['工作', '请假', '休息'];
const HOLIDAY_OPTIONS = ['是', '否'];
const PRESET_TAGS = ['工作', '学习', '休息', '社交', '家庭', '运动', '旅行', '阅读'];

let diaryData = {};
let currentDate = '';
let calendarMonth = '';
let viewMode = 'diary';
let tableRange = 14;
let tableOffset = 0;
let exercise = [];
let workStatus = '';
let isHoliday = '';
let tags = [];
let todos = [];
let autoSaveTimer = null;
let syncConfig = { token: '', gistId: '', lastSync: null };
const SYNC_CONFIG_KEY = 'diary_sync_config';
const GIST_API = 'https://api.github.com/gists';
const GIST_FILENAME = 'diary.json';

function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function fmtDateCN(s) {
  const d = parseDate(s);
  const week = ['日','一','二','三','四','五','六'][d.getDay()];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 周${week}`;
}
function fmtMonth(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function getDistanceFromToday(dateStr) {
  const today = fmtDate(new Date());
  const d1 = new Date(today + 'T00:00:00');
  const d2 = new Date(dateStr + 'T00:00:00');
  const diff = Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
  if (diff === 0) return { text: '今天', cls: 'today' };
  if (diff === 1) return { text: '明天', cls: 'future' };
  if (diff === -1) return { text: '昨天', cls: 'past' };
  if (diff > 0) return { text: `${diff}天后`, cls: 'future' };
  return { text: `${Math.abs(diff)}天前`, cls: 'past' };
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    diaryData = raw ? JSON.parse(raw) : {};
    for (const [k, v] of Object.entries(diaryData)) {
      if (v.todos && Array.isArray(v.todos)) {
        v.todos = v.todos.map(t => typeof t === 'string' ? { text: t, done: false } : t);
      }
    }
  } catch (e) { diaryData = {}; }
}
function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(diaryData)); }
function getDiary(date) { return diaryData[date] || null; }
function setDiary(date, entry) {
  entry.updatedAt = new Date().toISOString();
  if (!entry.createdAt) entry.createdAt = entry.updatedAt;
  diaryData[date] = entry;
  saveData();
}
function deleteDiaryEntry(date) { delete diaryData[date]; saveData(); syncPush(); }

// ======== 云端同步 (GitHub Gist) ========
function loadSyncConfig() {
  try {
    const raw = localStorage.getItem(SYNC_CONFIG_KEY);
    syncConfig = raw ? JSON.parse(raw) : { token: '', gistId: '', lastSync: null };
  } catch (e) { syncConfig = { token: '', gistId: '', lastSync: null }; }
}
function saveSyncConfigLocal() { localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify(syncConfig)); }

function isSyncConfigured() { return !!(syncConfig.token && syncConfig.gistId); }

function updateSyncUI(status, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + status;
  lbl.textContent = label;
}

function showSyncSetup() {
  loadSyncConfig();
  document.getElementById('syncTokenInput').value = syncConfig.token || '';
  document.getElementById('syncGistIdInput').value = syncConfig.gistId || '';
  document.getElementById('syncSetupOverlay').style.display = '';
}
function hideSyncSetup() { document.getElementById('syncSetupOverlay').style.display = 'none'; }

async function saveSyncConfig() {
  const token = document.getElementById('syncTokenInput').value.trim();
  let gistId = document.getElementById('syncGistIdInput').value.trim();
  if (!token) { showToast('请输入 GitHub Token'); return; }

  updateSyncUI('syncing', '验证中...');
  try {
    if (!gistId) {
      // 自动创建 Gist
      const resp = await fetch(GIST_API, {
        method: 'POST',
        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ description: '我的日记 - 云端同步', public: false, files: { [GIST_FILENAME]: { content: JSON.stringify(diaryData) } } })
      });
      if (!resp.ok) throw new Error((await resp.json()).message || '创建 Gist 失败');
      const gist = await resp.json();
      gistId = gist.id;
    }
    // 验证 token 有效
    const verifyResp = await fetch(`${GIST_API}/${gistId}`, { headers: { 'Authorization': `token ${token}` } });
    if (!verifyResp.ok) throw new Error('Token 无效或 Gist ID 不存在');

    syncConfig = { token, gistId, lastSync: new Date().toISOString() };
    saveSyncConfigLocal();
    hideSyncSetup();
    updateSyncUI('synced', '已同步');
    showToast('☁️ 云端同步已配置');
  } catch (err) {
    updateSyncUI('error', '连接失败');
    showToast('配置失败: ' + err.message);
  }
}

async function syncPush() {
  if (!isSyncConfigured()) return;
  updateSyncUI('syncing', '同步中...');
  try {
    const resp = await fetch(`${GIST_API}/${syncConfig.gistId}`, {
      method: 'PATCH',
      headers: { 'Authorization': `token ${syncConfig.token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(diaryData) } } })
    });
    if (!resp.ok) throw new Error('上传失败');
    syncConfig.lastSync = new Date().toISOString();
    saveSyncConfigLocal();
    updateSyncUI('synced', '已同步');
  } catch (err) {
    console.warn('Sync push failed:', err);
    updateSyncUI('error', '同步失败');
  }
}

async function syncPull() {
  if (!isSyncConfigured()) return;
  updateSyncUI('syncing', '同步中...');
  try {
    const resp = await fetch(`${GIST_API}/${syncConfig.gistId}`, {
      headers: { 'Authorization': `token ${syncConfig.token}` }
    });
    if (!resp.ok) throw new Error('下载失败');
    const gist = await resp.json();
    const file = gist.files[GIST_FILENAME];
    if (!file) throw new Error('Gist 中无数据');
    const remote = JSON.parse(file.content);
    // 智能合并：云端更新的记录覆盖本地更早的记录
    let merged = 0;
    for (const [date, entry] of Object.entries(remote)) {
      const local = diaryData[date];
      if (!local || new Date(entry.updatedAt || 0) > new Date(local.updatedAt || 0)) {
        diaryData[date] = entry;
        merged++;
      }
    }
    if (merged > 0) {
      saveData();
      refreshAll();
      showToast(`☁️ 从云端合并了 ${merged} 条记录`);
    }
    syncConfig.lastSync = new Date().toISOString();
    saveSyncConfigLocal();
    updateSyncUI('synced', '已同步');
  } catch (err) {
    console.warn('Sync pull failed:', err);
    updateSyncUI('error', '同步失败');
  }
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function exportData() {
  const blob = new Blob([JSON.stringify(diaryData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `diary-backup-${fmtDate(new Date())}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('数据已导出');
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (typeof imported !== 'object') throw new Error('格式错误');
      const merged = { ...diaryData, ...imported };
      if (!confirm(`即将导入 ${Object.keys(imported).length} 条记录。\n选择"确定"合并（同名日期覆盖），"取消"则仅导入新日期。`)) {
        for (const [k, v] of Object.entries(imported)) {
          if (!diaryData[k]) diaryData[k] = v;
        }
      } else { diaryData = merged; }
      saveData(); refreshAll(); showToast('导入成功');
    } catch (err) { showToast('导入失败：文件格式不正确'); }
  };
  reader.readAsText(file); event.target.value = '';
}

// ======== 近期任务面板 ========
function renderUpcoming() {
  const bar = document.getElementById('upcomingBar');
  const content = document.getElementById('upcomingContent');
  const today = fmtDate(new Date());
  const pending = [];

  for (const [dateStr, entry] of Object.entries(diaryData)) {
    if (entry.todos && entry.todos.length > 0) {
      entry.todos.forEach((t, idx) => {
        if (!t.done) pending.push({ date: dateStr, index: idx, text: t.text });
      });
    }
  }

  pending.sort((a, b) => {
    const aFut = a.date >= today, bFut = b.date >= today;
    if (aFut && !bFut) return -1;
    if (!aFut && bFut) return 1;
    return b.date.localeCompare(a.date);
  });

  if (pending.length === 0) {
    bar.classList.add('visible');
    content.innerHTML = '<div class="upcoming-list"><span style="font-size:0.8rem;color:var(--text-muted)">暂无待办任务 — 在日记中添加待办事项吧</span></div>';
    return;
  }

  bar.classList.add('visible');
  content.innerHTML = `<div class="upcoming-list">${pending.map(t => {
    const dist = getDistanceFromToday(t.date);
    return `<div class="upcoming-item">
      <span class="up-check" onclick="event.stopPropagation();toggleGlobalTodo('${t.date}',${t.index})" title="标记完成">✓</span>
      <span class="up-day" onclick="selectDate('${t.date}')">${dist.text}</span>
      <span class="up-text" onclick="selectDate('${t.date}')">${escapeHtml(t.text)}</span>
    </div>`;
  }).join('')}</div>`;
}

function toggleGlobalTodo(dateStr, index) {
  const entry = diaryData[dateStr];
  if (!entry || !entry.todos || index >= entry.todos.length) return;
  entry.todos[index].done = true;
  saveData();
  syncPush();
  renderUpcoming();
  if (currentDate === dateStr) { todos = entry.todos.map(t => ({ ...t })); renderTodos(); }
  if (viewMode === 'table') renderTableView();
  showToast('已标记完成');
}

// ======== 日历渲染 ========
function changeMonth(delta) {
  const [y, m] = calendarMonth.split('-').map(Number);
  calendarMonth = fmtMonth(new Date(y, m - 1 + delta, 1));
  renderCalendar();
}
function renderCalendar() {
  const [y, m] = calendarMonth.split('-').map(Number);
  const firstDay = new Date(y, m - 1, 1);
  const lastDay = new Date(y, m, 0);
  const totalDays = lastDay.getDate();
  const startDow = firstDay.getDay();
  const startOffset = startDow === 0 ? 6 : startDow - 1;

  document.getElementById('calMonthLabel').textContent = `${y}年${m}月`;

  const prevLastDay = new Date(y, m - 1, 0).getDate();
  let html = '';

  for (let i = startOffset - 1; i >= 0; i--) {
    const d = prevLastDay - i;
    const prevM = m - 1 > 0 ? m - 1 : 12;
    const prevY = m - 1 > 0 ? y : y - 1;
    const dateStr = `${prevY}-${String(prevM).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html += `<div class="cal-day other-month" onclick="selectDate('${dateStr}');calendarMonth='${prevY}-${String(prevM).padStart(2,'0')}';renderCalendar()">${d}${diaryData[dateStr]?'<span class="dot"></span>':''}</div>`;
  }

  const today = fmtDate(new Date());
  for (let d = 1; d <= totalDays; d++) {
    const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls = 'cal-day';
    if (dateStr === today) cls += ' today';
    if (dateStr === currentDate) cls += ' selected';
    html += `<div class="${cls}" onclick="selectDate('${dateStr}')">${d}${diaryData[dateStr]?'<span class="dot"></span>':''}</div>`;
  }

  const remaining = 7 - ((startOffset + totalDays) % 7);
  if (remaining < 7) {
    const nextM = m + 1 > 12 ? 1 : m + 1;
    const nextY = m + 1 > 12 ? y + 1 : y;
    for (let d = 1; d <= remaining; d++) {
      const dateStr = `${nextY}-${String(nextM).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      html += `<div class="cal-day other-month" onclick="selectDate('${dateStr}');calendarMonth='${nextY}-${String(nextM).padStart(2,'0')}';renderCalendar()">${d}${diaryData[dateStr]?'<span class="dot"></span>':''}</div>`;
    }
  }

  document.getElementById('calDays').innerHTML = html;
}

// ======== 历史列表 ========
function renderHistory() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const today = fmtDate(new Date());
  const dates = Object.keys(diaryData).sort().reverse();

  const filtered = query
    ? dates.filter(d => {
        const e = diaryData[d];
        return [e.bodyStatus, e.family, e.tasks, e.thoughts, e.weather, e.city, e.diet, e.workStatus, (e.tags||[]).join(' ')].join(' ').toLowerCase().includes(query);
      })
    : dates;

  let html = '';
  let lastMonth = '';
  if (filtered.length === 0) {
    html = '<div class="history-empty">暂无日记记录</div>';
  } else {
    for (const d of filtered) {
      const [y, m] = d.split('-');
      const monthKey = `${y}年${parseInt(m)}月`;
      if (monthKey !== lastMonth) { html += `<div class="history-month">${monthKey}</div>`; lastMonth = monthKey; }
      const e = diaryData[d];
      const summary = (e.tasks || e.thoughts || (e.todos && e.todos.length ? '待办 ' + e.todos.length + ' 项' : '') || '').replace(/\n/g, ' ').substring(0, 30) || '（无内容）';
      const activeCls = d === currentDate ? ' active' : '';
      const futureBadge = d > today ? '<span class="hi-future">未来</span>' : '';
      html += `<div class="history-item${activeCls}" onclick="selectDate('${d}')"><span class="hi-dot"></span><span class="hi-date">${parseInt(m)}月${parseInt(d.split('-')[2])}日</span><span class="hi-summary">${escapeHtml(summary)}</span>${futureBadge}</div>`;
    }
  }
  document.getElementById('historyList').innerHTML = html;
}
function escapeHtml(s) { const div = document.createElement('div'); div.textContent = s; return div.innerHTML; }

// ======== 表格视图 ========
function switchView(mode) {
  viewMode = mode;
  document.getElementById('diaryCard').style.display = mode === 'diary' ? '' : 'none';
  document.getElementById('tableViewCard').style.display = mode === 'table' ? '' : 'none';
  updateViewSwitcherButtons();
  if (mode === 'table') renderTableView();
}
function updateViewSwitcherButtons() {
  const diaryBtns = document.querySelectorAll('#diaryCard .view-switcher .btn');
  diaryBtns.forEach(b => b.classList.remove('btn-active'));
  const targetIdx = viewMode === 'table' ? 0 : 1;
  if (diaryBtns[targetIdx]) diaryBtns[targetIdx].classList.add('btn-active');
  const tableBtns = document.querySelectorAll('#tableViewCard .view-switcher .btn');
  tableBtns.forEach(b => b.classList.remove('btn-active'));
  const tTargetIdx = viewMode === 'table' ? 0 : 1;
  if (tableBtns[tTargetIdx]) tableBtns[tTargetIdx].classList.add('btn-active');
}
function setTableRange(days) {
  tableRange = days; tableOffset = 0;
  ['7','14','30','60','180'].forEach(d => {
    const btn = document.getElementById('rangeBtn' + d);
    if (btn) btn.classList.toggle('btn-active', parseInt(d) === days);
  });
  renderTableView();
}
function pageTable(direction) { tableOffset += direction * tableRange; renderTableView(); }
function renderTableView() {
  const today = fmtDate(new Date());
  const endDate = new Date(today + 'T00:00:00');
  endDate.setDate(endDate.getDate() + tableOffset);
  const startDate = new Date(endDate);
  startDate.setDate(startDate.getDate() - tableRange + 1);
  document.getElementById('tableRangeLabel').textContent = fmtDate(startDate).substring(5) + ' ~ ' + fmtDate(endDate).substring(5);

  const dates = [];
  for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
    dates.push(fmtDate(d));
  }

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = dates.map(dateStr => {
    const e = diaryData[dateStr];
    if (!e) {
      return `<tr onclick="switchView('diary');selectDate('${dateStr}')" class="clickable-row">
        <td><span class="date-link">${dateStr.substring(5)}</span></td>
        <td class="td-empty">—</td><td class="td-empty">—</td><td class="td-empty">—</td>
        <td class="td-empty">—</td><td class="td-empty">—</td><td class="td-empty">—</td>
        <td class="td-empty">—</td><td class="td-empty">—</td></tr>`;
    }
    const totalTodos = (e.todos || []).length;
    const doneTodos = (e.todos || []).filter(t => t.done).length;
    const pendingTodos = totalTodos - doneTodos;
    const todoHtml = totalTodos > 0
      ? `<span class="td-todo-count"><span class="done-count">✓${doneTodos}</span> <span class="pending-count">○${pendingTodos}</span></span>`
      : '—';
    return `<tr onclick="switchView('diary');selectDate('${dateStr}')" class="clickable-row">
      <td><span class="date-link">${dateStr.substring(5)}</span></td>
      <td>${e.isHoliday || '—'}</td>
      <td>${(e.tasks || '').replace(/\n/g, ' ').substring(0, 20) || '—'}</td>
      <td>${todoHtml}</td>
      <td>${(e.exercise || []).join('、') || '—'}</td>
      <td>${e.workStatus || '—'}</td>
      <td>${e.city || '—'}</td>
      <td>${(e.diet || '').substring(0, 20) || '—'}</td>
      <td>${(e.thoughts || '').replace(/\n/g, ' ').substring(0, 20) || '—'}</td>
    </tr>`;
  }).join('');
}

// ======== 表单渲染 ========
function renderChips(containerId, options, selected, multi, onChange) {
  const el = document.getElementById(containerId);
  el.innerHTML = options.map(opt => {
    const active = multi ? selected.includes(opt) : selected === opt;
    return `<span class="chip${active?' active':''}" data-value="${opt}">${opt}</span>`;
  }).join('');
  el.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const v = chip.dataset.value;
      if (multi) {
        if (selected.includes(v)) selected = selected.filter(x => x !== v);
        else selected = [...selected, v];
      } else { selected = selected === v ? '' : v; }
      onChange(selected);
    });
  });
}

function renderTodos() {
  const el = document.getElementById('todoList');
  el.innerHTML = todos.map((t, i) => `
    <div class="todo-item">
      <span class="todo-checkbox${t.done?' done':''}" onclick="toggleTodo(${i})">${t.done ? '✓' : ''}</span>
      <span class="todo-text${t.done?' done':''}">${escapeHtml(t.text)}</span>
      <button class="todo-delete" onclick="deleteTodo(${i})" title="删除">×</button>
    </div>`).join('');
}
function addTodo() {
  const input = document.getElementById('todoInput');
  const text = input.value.trim();
  if (!text) return;
  todos.push({ text, done: false });
  input.value = '';
  renderTodos();
  quickSave();
}
function toggleTodo(index) { if (index >= 0 && index < todos.length) { todos[index].done = !todos[index].done; renderTodos(); quickSave(); } }
function deleteTodo(index) { todos.splice(index, 1); renderTodos(); quickSave(); }

function addCustomTag() {
  const input = document.getElementById('customTagInput');
  const val = input.value.trim();
  if (!val) return;
  if (tags.includes(val)) { input.value = ''; return; }
  tags = [...tags, val];
  input.value = '';
  renderChips('tagsEl', [...PRESET_TAGS, ...tags.filter(t => !PRESET_TAGS.includes(t))], tags, true, (v) => { tags = v; renderTagChips(); });
}
function renderTagChips() {
  const allTags = [...new Set([...PRESET_TAGS, ...tags.filter(t => !PRESET_TAGS.includes(t))])];
  renderChips('tagsEl', allTags, tags, true, (v) => { tags = v; renderTagChips(); });
}

function loadDiaryToForm(date) {
  const entry = getDiary(date);
  exercise = entry?.exercise || [];
  workStatus = entry?.workStatus || '';
  isHoliday = entry?.isHoliday || '';
  tags = entry?.tags || [];
  todos = entry?.todos ? entry.todos.map(t => typeof t === 'string' ? { text: t, done: false } : { ...t }) : [];

  document.getElementById('cityInput').value = entry?.city || '';
  document.getElementById('weatherInput').value = entry?.weather || '';
  document.getElementById('bodyInput').value = entry?.bodyStatus || '';
  document.getElementById('dietInput').value = entry?.diet || '';
  document.getElementById('familyInput').value = entry?.family || '';
  document.getElementById('tasksInput').value = entry?.tasks || '';
  document.getElementById('thoughtsInput').value = entry?.thoughts || '';

  renderChips('exerciseEl', EXERCISE_OPTIONS, exercise, true, (v) => { exercise = v; renderChips('exerciseEl', EXERCISE_OPTIONS, exercise, true, () => {}); });
  renderChips('workStatusEl', WORK_STATUS_OPTIONS, workStatus, false, (v) => { workStatus = v; renderChips('workStatusEl', WORK_STATUS_OPTIONS, workStatus, false, () => {}); });
  renderChips('holidayEl', HOLIDAY_OPTIONS, isHoliday, false, (v) => { isHoliday = v; renderChips('holidayEl', HOLIDAY_OPTIONS, isHoliday, false, () => {}); });
  renderTagChips();
  renderTodos();

  document.getElementById('dateLabel').textContent = fmtDateCN(date);
  const dist = getDistanceFromToday(date);
  const badge = document.getElementById('distanceBadge');
  badge.textContent = dist.text;
  badge.className = 'distance-badge ' + dist.cls;

  document.getElementById('todoInput').value = '';
  document.getElementById('customTagInput').value = '';
  document.getElementById('saveHint').textContent = entry ? '已加载已有记录' : '新日记';
}

function quickSave() {
  const entry = {
    exercise, workStatus, isHoliday,
    city: document.getElementById('cityInput').value.trim(),
    weather: document.getElementById('weatherInput').value.trim(),
    bodyStatus: document.getElementById('bodyInput').value.trim(),
    diet: document.getElementById('dietInput').value.trim(),
    family: document.getElementById('familyInput').value.trim(),
    tasks: document.getElementById('tasksInput').value.trim(),
    thoughts: document.getElementById('thoughtsInput').value.trim(),
    tags, todos,
  };
  const existing = getDiary(currentDate);
  if (existing?.createdAt) entry.createdAt = existing.createdAt;
  setDiary(currentDate, entry);
  syncPush();
  renderCalendar(); renderHistory(); renderUpcoming();
  if (viewMode === 'table') renderTableView();
  updateStats();
}

function saveDiary() {
  const entry = {
    exercise, workStatus, isHoliday,
    city: document.getElementById('cityInput').value.trim(),
    weather: document.getElementById('weatherInput').value.trim(),
    bodyStatus: document.getElementById('bodyInput').value.trim(),
    diet: document.getElementById('dietInput').value.trim(),
    family: document.getElementById('familyInput').value.trim(),
    tasks: document.getElementById('tasksInput').value.trim(),
    thoughts: document.getElementById('thoughtsInput').value.trim(),
    tags, todos,
  };
  const existing = getDiary(currentDate);
  if (existing?.createdAt) entry.createdAt = existing.createdAt;
  setDiary(currentDate, entry);
  syncPush();
  renderCalendar(); renderHistory(); renderUpcoming();
  if (viewMode === 'table') renderTableView();
  updateStats();
  document.getElementById('saveHint').textContent = '✓ 已保存 ' + new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
  showToast('日记已保存');
}

function deleteDiary() {
  if (!getDiary(currentDate)) { showToast('没有可删除的记录'); return; }
  if (!confirm(`确定删除 ${fmtDateCN(currentDate)} 的日记吗？此操作不可恢复。`)) return;
  deleteDiaryEntry(currentDate);
  refreshAll();
  showToast('已删除');
}

function selectDate(dateStr) {
  currentDate = dateStr;
  if (viewMode === 'table') switchView('diary');
  loadDiaryToForm(dateStr);
  renderCalendar(); renderHistory();
}
function changeDate(delta) { const d = parseDate(currentDate); d.setDate(d.getDate() + delta); selectDate(fmtDate(d)); }
function goToToday() { selectDate(fmtDate(new Date())); }

function updateStats() {
  const total = Object.keys(diaryData).length;
  const thisMonth = fmtDate(new Date()).substring(0, 7);
  const monthCount = Object.keys(diaryData).filter(d => d.startsWith(thisMonth)).length;
  document.getElementById('stats').innerHTML = `<span class="stat-badge">📝 总计 ${total} 篇</span><span class="stat-badge">📅 本月 ${monthCount} 篇</span>`;
}

function refreshAll() {
  loadDiaryToForm(currentDate);
  renderCalendar(); renderHistory(); renderUpcoming();
  if (viewMode === 'table') renderTableView();
  updateStats();
}

function setupAutoSave() {
  ['weatherInput','bodyInput','familyInput','tasksInput','thoughtsInput','cityInput','dietInput'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      clearTimeout(autoSaveTimer);
      document.getElementById('saveHint').textContent = '未保存...';
    });
  });
}

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveDiary(); }
  if (e.key === 'ArrowLeft' && !e.target.closest('input,textarea')) changeDate(-1);
  if (e.key === 'ArrowRight' && !e.target.closest('input,textarea')) changeDate(1);
});

function init() {
  loadData();
  loadSyncConfig();
  currentDate = fmtDate(new Date());
  calendarMonth = fmtDate(new Date());
  loadDiaryToForm(currentDate);
  renderCalendar(); renderHistory(); renderUpcoming();
  updateStats();
  setupAutoSave();
  switchView('diary');
  // 初始化同步状态 UI
  if (isSyncConfigured()) {
    updateSyncUI('synced', '已同步');
    syncPull(); // 页面加载时拉取最新数据
  } else {
    updateSyncUI('', '未配置');
  }
}
init();
</script>
</body>
</html>
